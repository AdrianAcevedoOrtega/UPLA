<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLA - Sistema de Reservas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏨 Sistema de Reservas UPLA</h1>
            <p>Gestión de reservas de apartamentos</p>
        </header>

        <main>
            <section class="form-section">
                <h2>📝 Crear Nueva Reserva</h2>
                <form id="reservaForm">
                    <div class="form-group">
                        <label for="id_cliente">ID Cliente:</label>
                        <input type="number" id="id_cliente" name="id_cliente" placeholder="Ej: 1" required>
                    </div>

                    <div class="form-group">
                        <label for="dni">DNI/Pasaporte:</label>
                        <input type="text" id="dni" name="dni" placeholder="Ej: 12345678A" required>
                    </div>

                    <div class="form-group">
                        <label for="id_apartamento">ID Apartamento:</label>
                        <input type="number" id="id_apartamento" name="id_apartamento" placeholder="Ej: 1" required>
                    </div>

                    <div class="form-group">
                        <label for="f_entrada">Fecha de Entrada:</label>
                        <input type="date" id="f_entrada" name="f_entrada" required>
                    </div>

                    <div class="form-group">
                        <label for="f_salida">Fecha de Salida:</label>
                        <input type="date" id="f_salida" name="f_salida" required>
                    </div>

                    <button type="submit" class="btn btn-primary">🚀 Crear Reserva</button>
                </form>
                <div id="message" class="message"></div>
            </section>

            <section class="list-section">
                <h2>📋 Lista de Reservas</h2>
                <div class="filters">
                    <label for="page">Página:</label>
                    <input type="number" id="page" value="0" min="0">
                    <label for="size">Elementos por página:</label>
                    <input type="number" id="size" value="10" min="1" max="50">
                    <button onclick="loadReservas()" class="btn btn-secondary">🔄 Cargar Reservas</button>
                </div>

                <div id="reservasList" class="reservas-grid">
                    <!-- Las reservas se cargarán aquí dinámicamente -->
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
